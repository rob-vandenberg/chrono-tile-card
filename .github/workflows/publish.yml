name: publish-new-version
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version being published"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate version format
        run: echo "${{ github.event.inputs.version }}" | grep -E "^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$"
      - name: Install dependencies
        run: yarn install
      - name: Build
        run: yarn build
      - name: Commit and push
        uses: EndBug/add-and-commit@v10
        with:
          add: '["dist/chrono-tile-card.js"]'
          message: "Publishing version ${{ github.event.inputs.version }}"
          tag: "v${{ github.event.inputs.version }}"
          tag_push: '--force'
      - name: Publish Github release
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body: "Published by Rob Vandenberg"
          makeLatest: true
          allowUpdates: true
          artifacts: "dist/*.js"
